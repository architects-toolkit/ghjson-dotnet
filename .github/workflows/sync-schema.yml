name: 🔄 Sync Schema from ghjson-spec

# Description: Syncs the embedded GhJSON schema snapshot (main + extensions) from the
# published ghjson-spec. Opens a PR to `dev` when drift is detected.
#
# Triggers:
#   - Manual dispatch
#   - Daily at 06:00 UTC
#   - When Sync-Schemas.ps1 or this workflow change on dev
#
# Permissions:
#   - contents:write      - Required to commit & push the sync branch
#   - pull-requests:write - Required to open the PR

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [ dev ]
    paths:
      - 'tools/Sync-Schemas.ps1'
      - '.github/workflows/sync-schema.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-schema:
    name: 🔄 Sync Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Run Sync-Schemas.ps1
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File ./tools/Sync-Schemas.ps1

      - name: Check for changes
        id: check
        shell: pwsh
        run: |
          $changes = git status --porcelain src/GhJSON.Core/Validation/Schemas
          if ($changes) {
            "has-changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Drift detected:"
            Write-Host $changes
          } else {
            "has-changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "✅ Embedded schemas already match the published spec."
          }

      - name: Create Pull Request
        if: steps.check.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(schemas): sync embedded snapshot from ghjson-spec"
          title: "chore(schemas): sync embedded snapshot from ghjson-spec"
          body: |
            Automated sync of the embedded GhJSON schema snapshot
            (`src/GhJSON.Core/Validation/Schemas/v1.0/**`) from the published
            [ghjson-spec](https://architects-toolkit.github.io/ghjson-spec/schema/v1.0/).

            Generated by `tools/Sync-Schemas.ps1`.
          branch: chore/sync-schemas
          base: dev
          delete-branch: true
          labels: |
            chore
            automated
            schemas
